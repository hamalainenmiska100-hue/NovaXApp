name: Build NovaX IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show files (debug)
        run: ls -R

      - name: Build App
        run: |
          xcodebuild \
          -project NovaX.xcodeproj \
          -scheme NovaXApp \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir Payload
          cp -R build/Build/Products/Release-iphoneos/NovaXApp.app Payload/
          zip -r NovaX.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NovaX-IPA
          path: NovaX.ipa
