name: Build NovaX IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          pwd
          ls -la
          xcodebuild -version

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project NovaX.xcodeproj

      - name: Build App
        run: |
          xcodebuild \
            -project NovaX.xcodeproj \
            -scheme NovaXApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/NovaXApp.app Payload/
          zip -r NovaX.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NovaX-IPA
          path: NovaX.ipa
